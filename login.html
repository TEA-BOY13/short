<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FUGA Navigation Login</title>
    <style>
      :root { color-scheme: light; font-family:Segoe UI, Arial, sans-serif; }
      body { margin:0; min-height:100vh; display:grid; place-items:center; background:linear-gradient(135deg,#0f172a,#1e3a5f 60%,#1f4f3d); color:#fff; }
      .card { width:min(92vw, 420px); padding:24px; border-radius:20px; background:rgba(255,255,255,0.95); color:#14213d; box-shadow:0 20px 40px rgba(0,0,0,0.2); }
      h1 { margin-top:0; }
      label { display:block; margin-bottom:10px; font-size:0.95rem; }
      input { width:100%; padding:10px 12px; border-radius:10px; border:1px solid #dfe6ef; margin-top:6px; }
      button { width:100%; margin-top:12px; padding:11px 12px; border:none; border-radius:10px; background:#1f8f5f; color:#fff; cursor:pointer; }
      a { color:#1f4f3d; text-decoration:none; font-weight:600; }
      .muted { color:#5e6b85; font-size:0.9rem; margin-top:10px; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Welcome back</h1>
      <p>Sign in to open the FUGA Smart Campus Navigator.</p>
      <form action="dashboard.html">
        <label>
          Email
          <input type="email" placeholder="student@fuga.edu.ng" required />
        </label>
        <label>
          Password
          <input type="password" placeholder="••••••••" required />
        </label>
        <button type="submit">Login</button>
      </form>
      <p class="muted">No account yet? <a href="signup.html">Create one</a></p>
    </div>
  </body>
</html>
